name: Bug Report
description: Report a bug or unexpected behavior in NemoClaw
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees:
  - NVIDIA/nemoclaw-maintainers
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out this form as completely as possible.
        
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Run command '...'
        2. See error '...'
        3. Expected '...' but got '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected outcome
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually occurred
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - TypeScript Plugin (nemoclaw/)
        - Python Blueprint (nemoclaw-blueprint/)
        - CLI Scripts (bin/)
        - Installation (install.sh/uninstall.sh)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant environment details
      value: |
        - OS: [e.g., Ubuntu 22.04]
        - Node.js version: [e.g., 22.0.0]
        - Python version: [e.g., 3.11.5]
        - NemoClaw version: [e.g., commit hash or tag]
        - Docker version: [e.g., 24.0.5]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste relevant log output, stack traces, or error messages
      render: shell
      placeholder: |
        Paste logs here (please redact any sensitive information like API keys)

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant configuration (redact sensitive data!)
      render: yaml
      placeholder: |
        # Paste relevant config here
        # IMPORTANT: Redact API keys, tokens, and other secrets

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have redacted all sensitive information (API keys, tokens, passwords)
          required: true
        - label: I have included all relevant environment details
          required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information that might be helpful
      placeholder: Add any other context about the problem here
