name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm install
      - run: cd nemoclaw && npm install
      - name: Run tests with coverage
        run: cd nemoclaw && npx vitest run --coverage

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: cd nemoclaw-blueprint && uv sync --extra dev
      - name: Run tests with coverage
        run: cd nemoclaw-blueprint && uv run pytest
