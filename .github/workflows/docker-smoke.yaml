#
# Smoke test: build the production Dockerfile and verify the image starts.
# Catches Dockerfile syntax errors, missing files, broken COPY/RUN steps,
# and plugin installation failures before they reach release.

name: docker-smoke

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - 'nemoclaw/**'
      - 'nemoclaw-blueprint/**'
      - 'scripts/nemoclaw-start.sh'
      - 'scripts/write-openclaw-config.py'
  push:
    branches: [main]
    paths:
      - 'Dockerfile'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build TypeScript plugin
        working-directory: nemoclaw
        run: |
          npm install
          npm run build

      - name: Build production Docker image
        run: docker build -t nemoclaw-smoke-test .

      - name: Verify image starts
        run: |
          # Use --entrypoint bash because nemoclaw-start is the production
          # ENTRYPOINT (a daemon launcher); verification steps need a shell.
          docker run --rm --entrypoint bash nemoclaw-smoke-test -c "echo 'Container started successfully'"

      - name: Verify plugin files exist
        run: |
          docker run --rm --entrypoint bash nemoclaw-smoke-test -c "
            test -f /opt/nemoclaw/dist/index.js && echo '✓ Plugin JS built'
            test -f /opt/nemoclaw/openclaw.plugin.json && echo '✓ Plugin manifest present'
            test -d /opt/nemoclaw/node_modules && echo '✓ Node modules installed'
            test -f /opt/nemoclaw-blueprint/blueprint.yaml && echo '✓ Blueprint present'
            test -f /sandbox/.openclaw/openclaw.json && echo '✓ OpenClaw config written'
          "

      - name: Verify Python venv works
        run: |
          docker run --rm --entrypoint bash nemoclaw-smoke-test -c "
            python3 -c 'import yaml; print(\"✓ PyYAML available\")'
            python3 -c 'import json; print(\"✓ Python stdlib ok\")'
          "

      - name: Verify sandbox user and permissions
        run: |
          docker run --rm --entrypoint bash nemoclaw-smoke-test -c "
            whoami | grep -q sandbox && echo '✓ Running as sandbox user'
            test -d /sandbox/.openclaw && echo '✓ OpenClaw dir exists'
            test -d /sandbox/.nemoclaw && echo '✓ NemoClaw dir exists'
          "
