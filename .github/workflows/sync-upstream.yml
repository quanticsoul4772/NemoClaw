# Sync fork's main branch with NVIDIA/NemoClaw upstream daily
name: Sync Upstream

on:
  schedule:
    - cron: '17 6 * * *'  # Daily at 6:17 AM UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git remote add upstream https://github.com/NVIDIA/NemoClaw.git || true
          git fetch upstream main
          git checkout main

          # Check if upstream has new commits we don't have
          UPSTREAM_NEW=$(git log HEAD..upstream/main --oneline | wc -l)
          if [ "$UPSTREAM_NEW" -eq 0 ]; then
            echo "No new commits from upstream — fork is up to date or ahead"
            exit 0
          fi

          echo "$UPSTREAM_NEW new commit(s) from upstream. Syncing..."

          # Save our own workflow files (GITHUB_TOKEN cannot push .github/workflows changes)
          cp -r .github/workflows /tmp/fork-workflows

          # Reset to upstream state
          git reset --hard upstream/main

          # Restore our workflow files so the push doesn't include workflow diffs
          rm -rf .github/workflows
          cp -r /tmp/fork-workflows .github/workflows

          # Commit all upstream changes (minus workflow diffs) and push
          git add -A
          git diff --staged --quiet && echo "Only workflow changes from upstream — nothing to push" && exit 0
          git commit -m "chore: sync upstream NVIDIA/NemoClaw"
          git push origin main
