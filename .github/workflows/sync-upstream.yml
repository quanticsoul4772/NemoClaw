# Sync fork's main branch with NVIDIA/NemoClaw upstream daily
name: Sync Upstream

on:
  schedule:
    - cron: '17 6 * * *'  # Daily at 6:17 AM UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git remote add upstream https://github.com/NVIDIA/NemoClaw.git || true
          git fetch upstream main
          git checkout main

          # Check if upstream has new commits we don't have
          UPSTREAM_NEW=$(git log HEAD..upstream/main --oneline | wc -l)
          if [ "$UPSTREAM_NEW" -eq 0 ]; then
            echo "No new commits from upstream — fork is up to date or ahead"
            exit 0
          fi

          echo "$UPSTREAM_NEW new commit(s) from upstream. Merging..."
          git merge upstream/main --no-ff -m "chore: sync upstream NVIDIA/NemoClaw"
          git push origin main
