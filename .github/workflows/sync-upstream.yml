# Sync fork's main branch with NVIDIA/NemoClaw upstream daily
name: Sync Upstream

on:
  schedule:
    - cron: '17 6 * * *'  # Daily at 6:17 AM UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/NVIDIA/NemoClaw.git || true
          git fetch upstream main
          git checkout main
          git merge upstream/main --ff-only
          git push origin main
