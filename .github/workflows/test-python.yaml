name: test-python

on:
  pull_request:
    paths:
      - 'nemoclaw-blueprint/**'
  push:
    branches: [main]
    paths:
      - 'nemoclaw-blueprint/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pyyaml

      - name: Run Python tests
        working-directory: nemoclaw-blueprint
        run: |
          python -m pytest tests/ -v; ec=$?
          # Exit code 5 = no tests collected (expected when upstream modules absent)
          [ $ec -eq 5 ] && echo "No tests collected (upstream modules unavailable — expected)" && exit 0
          exit $ec

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Audit npm dependencies
        run: npm audit --audit-level=high || true
