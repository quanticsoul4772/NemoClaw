preset:
  name: docker
  description: "Docker Hub and NVIDIA container registry access"

network_policies:
  docker_registries:
    name: docker_registries
    endpoints:
      - host: registry-1.docker.io
        port: 443
        access: full
      - host: auth.docker.io
        port: 443
        access: full
      - host: nvcr.io
        port: 443
        access: full
      - host: authn.nvidia.com
        port: 443
        access: full
