preset:
  name: github
  description: "GitHub repository and API access (read/write)"

network_policies:
  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
      - host: raw.githubusercontent.com
        port: 443
        access: full
      - host: objects.githubusercontent.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/gh }
      - { path: /usr/local/bin/git }
      - { path: /usr/local/bin/gh }
