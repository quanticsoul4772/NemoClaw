preset:
  name: huggingface
  description: "Hugging Face Hub, LFS, and Inference API access"

network_policies:
  huggingface:
    name: huggingface
    endpoints:
      - host: huggingface.co
        port: 443
        access: full
      - host: cdn-lfs.huggingface.co
        port: 443
        access: full
      - host: api-inference.huggingface.co
        port: 443
        access: full
