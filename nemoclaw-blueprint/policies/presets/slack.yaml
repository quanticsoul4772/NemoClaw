preset:
  name: slack
  description: "Slack API and webhooks access"

network_policies:
  slack:
    name: slack
    endpoints:
      - host: slack.com
        port: 443
        access: full
      - host: api.slack.com
        port: 443
        access: full
      - host: hooks.slack.com
        port: 443
        access: full
